
<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ເຄື່ອງມືສ້າງບາໂຄດ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-lg font-bold text-gray-800">ສ້າງບາໂຄດ</h1>
            <div id="timerDisplay" class="text-xs text-red-500 font-mono bg-red-50 px-2 py-1 rounded border border-red-200">10:00</div>
        </div>
        
        <p class="text-xs text-gray-500 mb-4">ລະບົບຈະປິດອັດຕະໂນມັດໃນ 10 ນາທີ</p>
        
        <textarea id="inputArea" rows="6" 
            class="w-full border-2 border-gray-200 rounded-xl p-3 mb-4 focus:border-blue-500 outline-none uppercase" 
            placeholder="ໃສ່ລະຫັດທີ່ນີ້ (ພິມໃຫຍ່ເທົ່ານັ້ນ)..."
            oninput="this.value = this.value.toUpperCase(); resetTimer();"></textarea>
        
        <div class="flex gap-2">
            <button onclick="generateBarcodes()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold active:scale-95 transition">ສ້າງບາໂຄດ</button>
            <button id="downloadBtn" onclick="confirmAndDownload()" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold active:scale-95 transition hidden">ດາວໂຫຼດ .ZIP</button>
        </div>

        <div id="status" class="mt-4 text-sm text-center text-gray-600 font-bold uppercase italic"></div>
        <div id="barcodeContainer" class="mt-6 flex flex-col items-center gap-6"></div>
    </div>

    <script>
        let currentBarcodes = [];
        let timeLeft = 600; // 10 ນາທີ

        const timerInterval = setInterval(() => {
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                window.close();
            }
        }, 1000);

        function resetTimer() { timeLeft = 600; }

        function generateBarcodes() {
            resetTimer();
            const container = document.getElementById('barcodeContainer');
            const status = document.getElementById('status');
            const lines = document.getElementById('inputArea').value.split('\n')
                .filter(line => line.trim() !== '').slice(0, 50);
            
            container.innerHTML = '';
            currentBarcodes = [];
            
            lines.forEach((text) => {
                const canvas = document.createElement('canvas');
                canvas.className = "bg-white shadow-sm";
                container.appendChild(canvas);
                JsBarcode(canvas, text, { format: "CODE128", width: 2, height: 50, displayValue: true });
                currentBarcodes.push({ canvas, text });
            });

            if (currentBarcodes.length > 0) {
                document.getElementById('downloadBtn').classList.remove('hidden');
                status.innerText = `ສ້າງບາໂຄດສຳເລັດ ${currentBarcodes.length} ລາຍການ`;
            }
        }

        function confirmAndDownload() {
            if (confirm("ທ່ານຕ້ອງການດາວໂຫຼດໄຟລ໌ບາໂຄດທັງໝົດ (.ZIP) ແມ່ນ ຫຼື ບໍ່?")) {
                downloadAll();
            }
        }

        async function downloadAll() {
            resetTimer();
            document.getElementById('status').innerText = "ກຳລັງກະກຽມໄຟລ໌...";
            
            const zip = new JSZip();
            for (let i = 0; i < currentBarcodes.length; i++) {
                const dataUrl = currentBarcodes[i].canvas.toDataURL("image/png");
                const base64Data = dataUrl.split(',')[1];
                zip.file(`BARCODE_${i+1}.png`, base64Data, {base64: true});
            }
            const blob = await zip.generateAsync({ type: "blob" });
            saveAs(blob, "BARCODES.ZIP");
            document.getElementById('status').innerText = "ດາວໂຫຼດສຳເລັດ";
        }
    </script>
</body>
</html>
