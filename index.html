```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกน QR Code</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #reader { width: 100%; max-width: 500px; margin: auto; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-xl font-bold mb-4 text-center">สแกน QR Code</h1>
        
        <div id="reader" class="rounded-lg overflow-hidden border border-gray-300"></div>

        <div class="mt-4 flex gap-2">
            <button id="flashBtn" class="bg-yellow-500 text-white w-full py-2 rounded-lg font-bold">เปิด/ปิด Flash</button>
        </div>

        <div class="mt-6">
            <label class="block text-sm font-medium mb-1">หรือกรอกรหัสด้วยตนเอง</label>
            <input type="text" id="manualInput" class="w-full p-2 border border-gray-300 rounded-lg mb-2" placeholder="ใส่รหัส QR...">
            <button id="manualBtn" class="bg-blue-600 text-white w-full py-2 rounded-lg">ตกลง</button>
        </div>
    </div>

    <!-- Popup Modal -->
    <div id="popup" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-6 w-full max-w-sm">
            <h2 class="text-lg font-bold mb-4">บันทึกข้อมูล</h2>
            
            <label class="block text-xs text-gray-500">รหัส QR</label>
            <input type="text" id="popupQrCode" disabled class="w-full p-2 border bg-gray-100 rounded mb-3">
            
            <label class="block text-xs text-gray-500">วันที่</label>
            <input type="date" id="popupDate" class="w-full p-2 border rounded mb-3">
            
            <label class="block text-xs text-gray-500">สถานะ</label>
            <select id="popupStatus" class="w-full p-2 border rounded mb-3">
                <option value="สำเร็จ" selected>สำเร็จ</option>
                <option value="ปัญหา">ปัญหา</option>
            </select>

            <label class="block text-xs text-gray-500">เนื้อหาเพิ่มเติม</label>
            <textarea id="popupNote" class="w-full p-2 border rounded mb-4" rows="3"></textarea>

            <div class="flex gap-2">
                <button onclick="closePopup()" class="w-1/2 py-2 bg-gray-300 rounded">ปิด</button>
                <button onclick="saveData()" class="w-1/2 py-2 bg-green-600 text-white rounded">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        let html5QrCode = new Html5Qrcode("reader");
        let isFlashOn = false;

        // เริ่มต้นกล้อง
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => { stopScanner(); showPopup(decodedText); },
            (errorMessage) => { /* ignore */ }
        );

        function stopScanner() {
            html5QrCode.stop();
            // ปิด Flash ถ้าเปิดอยู่
            isFlashOn = false;
        }

        document.getElementById('flashBtn').addEventListener('click', async () => {
            // หมายเหตุ: การควบคุม Flash ผ่านเบราว์เซอร์มือถือขึ้นอยู่กับ Browser API
            // เบราว์เซอร์หลายตัวยังไม่รองรับการสลับ Flash ในตัวแปรนี้ แต่โค้ดนี้เตรียมโครงสร้างไว้
            alert("ระบบ Flash ถูกเรียกใช้งาน (ขึ้นอยู่กับการรองรับของเบราว์เซอร์)");
            isFlashOn = !isFlashOn;
        });

        document.getElementById('manualBtn').addEventListener('click', () => {
            const val = document.getElementById('manualInput').value;
            if (val) { stopScanner(); showPopup(val); }
        });

        function showPopup(code) {
            document.getElementById('popupQrCode').value = code;
            document.getElementById('popupDate').valueAsDate = new Date();
            document.getElementById('popup').classList.remove('hidden');
        }

        function closePopup() {
            document.getElementById('popup').classList.add('hidden');
            location.reload(); // รีโหลดเพื่อเปิดกล้องใหม่
        }

        function saveData() {
            alert("บันทึกข้อมูลเรียบร้อยแล้ว");
            closePopup();
        }
    </script>
</body>
</html>

```
